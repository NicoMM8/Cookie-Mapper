name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci

    # We only verify that the syntax is correct and the modules can be built,
    # as running the Playwright crawler requires a valid Neo4j instance
    # and might be blocked by bot mitigations on CI runners.
    - name: Check code formatting and syntax
      run: node -c src/batch-auditor.js
